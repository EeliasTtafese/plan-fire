<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>መተግበሪያ ለመፍትሔ</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="dashboard">
        <header>
            <h1>የዕቅድ/ሪፖርት ዝግጅት</h1>
            <p class="subtitle">የዕቅድ/ሪፖርት ዝግጅት የኢንሸቲቭ ስራዎች፣ የጸረ ሙስናና የበጀት አጠቃቀም ሥርዓትን ማጎልበት</p>
        </header>

        <!-- Macro Progress Component -->
        <div class="overall-card">
            <div class="overall-header">
                <span><a href="index1.html">የህዝብ ግንኙነት አገልግሎትንና አሰራር ስርዓትን ከ55% ወደ 100% ማድረስ</a></span>
                <span id="macroPercent">0%</span>
            </div>
            <div class="progress-track">
                <div id="macroBar" class="progress-fill bg-green"></div>
            </div>
        </div>

        <!-- Roadmap Items Loop -->
        <div class="roadmap-list">
            
            <!-- Phase 1 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">የኮሚሽኑን መረጃዎች በተለያዩ የተግባቦት ዘዴዎች 100% ተደራሽ ማድረግ</span>
                    <div class="controls">
                        <label for="p1">ክንውን</label>
                        <input type="number" id="p1" class="progress-input" min="0" max="100" value="75">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p1Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

            <!-- Phase 2 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">የማህበራዊ ሚዲያ ተከታዮችን ቁጥር ከ3935 ወደ 5935 ማድረስ</span>
                    <div class="controls">
                        <label for="p2">ክንውን</label>
                        <input type="number" id="p2" class="progress-input" min="0" max="100" value="40">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p2Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
