<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>መተግበሪያ ለመፍትሔ</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="dashboard">
        <header>
            <h1>የዕቅድ/ሪፖርት ዝግጅት</h1>
            <p class="subtitle">የዕቅድ/ሪፖርት ዝግጅት የኢንሸቲቭ ስራዎች፣ የጸረ ሙስናና የበጀት አጠቃቀም ሥርዓትን ማጎልበት</p>
        </header>

        <!-- Macro Progress Component -->
        <div class="overall-card">
            <div class="overall-header">
                <span><a href="index1.html">የበጀት አጠቃቀም አሰራርንና ውጤታማነትን 100% ማሻሻል</a></span>
                <span id="macroPercent">0%</span>
            </div>
            <div class="progress-track">
                <div id="macroBar" class="progress-fill bg-green"></div>
            </div>
        </div>

        <!-- Roadmap Items Loop -->
        <div class="roadmap-list">
            
            <!-- Phase 1 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">የተመደበ በጀት 100% በአግባቡ ሥራ ላይ ማዋል</span>
                    <div class="controls">
                        <label for="p1">ክንውን</label>
                        <input type="number" id="p1" class="progress-input" min="0" max="100" value="78">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p1Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

            <!-- Phase 2 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">ነቀፌታ ያለበትን የኦዲት ግኝት መቀነስና የተወሰደ ተጨባጭ እርምጃ</span>
                    <div class="controls">
                        <label for="p2">ክንውን</label>
                        <input type="number" id="p2" class="progress-input" min="0" max="100" value="89">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p2Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

            <!-- Phase 3 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">የክፍያና ሂሳብ አስተዳደር ስራዎችን 100% ማከናወን</span>
                    <div class="controls">
                        <label for="p3">ክንውን</label>
                        <input type="number" id="p3" class="progress-input" min="0" max="100" value="99">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p3Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

            <!-- Phase 4 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">የግዥና ንብረት አስተዳደር ስራዎችን 80% መፈጸም</span>
                    <div class="controls">
                        <label for="p4">ክንውን</label>
                        <input type="number" id="p4" class="progress-input" min="0" max="100" value="90">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p4Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

            <!-- Phase 5 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">የህንፃ አስተዳደር ስራዎችን 100% መፈፀም</span>
                    <div class="controls">
                        <label for="p5">ክንውን</label>
                        <input type="number" id="p5" class="progress-input" min="0" max="100" value="98">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p5Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
