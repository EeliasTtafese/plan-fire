<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>መተግበሪያ ለመፍትሔ</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="dashboard">
        <header>
            <h1>የዕቅድ ግብ አተገባበር</h1>
            <p class="subtitle">ግብ አተገባበር</p>
        </header>

        <!-- Macro Progress Component -->
        <div class="overall-card">
            <div class="overall-header">
                <span><a href="index.html">የአደጋ ምላሽ ስትራቴጂክ አገልግሎቶችን ማሳደግ </a></span>

            </div>
            <div class="progress-track">
                <div id="macroBar" class="progress-fill bg-green"></div>
            </div>
        </div>

        <!-- Roadmap Items Loop -->
        <div class="roadmap-list">
            
            <!-- Phase 1 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title"><a href="index6.1.html">የአደጋ ምላሽ አሰጣጥ ስታንዳርድ አፈፃፀም ከ 90 ወደ 91.6 % ማድረስ</a></span>
                    <div class="controls">
                        <label for="p1">ክንውን</label>
                        <input type="number" id="p1" class="progress-input" min="0" max="100" value="70">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p1Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

            <!-- Phase 2 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title"><a href="index6.2.html">የአደጋ ምላሽ አገልግሎት አሰጣጥ በማሳደግ የማዳን አቅም ከ90 ወደ 91.6 % ማድረስ</a></span>
                    <div class="controls">
                        <label for="p2">ክንውን</label>
                        <input type="number" id="p2" class="progress-input" min="0" max="100" value="89">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p2Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

            <!-- Phase 3 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title"><a href="index6.3.html">የአደጋ መረጃ ተደራሽነትንና ውጤታማነትን ከ80.9 ወደ 82% ማሻሻል</a></span>
                    <div class="controls">
                        <label for="p3">ክንውን</label>
                        <input type="number" id="p3" class="progress-input" min="0" max="100" value="65">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p3Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

            <!-- Phase 4 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title"><a href="index6.4.html">የድንገተኛ አደጋዎች እና የአደጋ ሰራተኞች ህክምና 100% ተደራሽ ማድረግ</a></span>
                    <div class="controls">
                        <label for="p4">ክንውን</label>
                        <input type="number" id="p4" class="progress-input" min="0" max="100" value="78">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p4Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
