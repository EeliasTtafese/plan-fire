<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>መተግበሪያ ለመፍትሔ</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="dashboard">
        <header>
            <h1>የዕቅድ/ሪፖርት ዝግጅት</h1>
            <p class="subtitle">የዕቅድ/ሪፖርት ዝግጅት የኢንሸቲቭ ስራዎች፣ የጸረ ሙስናና የበጀት አጠቃቀም ሥርዓትን ማጎልበት</p>
        </header>

        <!-- Macro Progress Component -->
        <div class="overall-card">
            <div class="overall-header">
                <span><a href="index1.html">የበጎ አድራጎት እና ኢንሸቲቭ ሥራዎችን 100% ማጎልበት</a></span>
                <span id="macroPercent">0%</span>
            </div>
            <div class="progress-track">
                <div id="macroBar" class="progress-fill bg-green"></div>
            </div>
        </div>

        <!-- Roadmap Items Loop -->
        <div class="roadmap-list">
            
            <!-- Phase 1 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">የአቅመ ደካማ ቤተሰቦችን ቤት ማደስ</span>
                    <div class="controls">
                        <label for="p1">ክንውን</label>
                        <input type="number" id="p1" class="progress-input" min="0" max="100" value="75">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p1Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

            <!-- Phase 2 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">የአረንጓዴ አሻራ ተግባራትን ማካሄድ 20ሺ ችግኞችን መትከል</span>
                    <div class="controls">
                        <label for="p2">ክንውን</label>
                        <input type="number" id="p2" class="progress-input" min="0" max="100" value="40">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p2Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

            <!-- Phase 3 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">ለተለያዩ ማህበራዊ ቀውሶች የተደረገ ድጋፍ 1,000,000</span>
                    <div class="controls">
                        <label for="p3">ክንውን</label>
                        <input type="number" id="p3" class="progress-input" min="0" max="100" value="60">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p3Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

            <!-- Phase 4 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">አሁን ከሚረዱት 10 ወላጆቻቸውን ያጡ ህፃናት ወደ 24 ማሳደግ</span>
                    <div class="controls">
                        <label for="p4">ክንውን</label>
                        <input type="number" id="p4" class="progress-input" min="0" max="100" value="50">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p4Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

            <!-- Phase 5 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">ማዕድ ማጋራት 5,000,000</span>
                    <div class="controls">
                        <label for="p5">ክንውን</label>
                        <input type="number" id="p5" class="progress-input" min="0" max="100" value="10">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p5Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
